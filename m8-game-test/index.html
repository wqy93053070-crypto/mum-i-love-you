<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ 手机关键：否则页面会被当成桌机缩小 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>花园 Block 游戏（最终版）</title>

  <!-- ✅ 游戏专用样式 -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ✅ 游戏主体 -->
  <div id="game">

    <!-- ✅ 分数显示（game.js 会操作这个） -->
    <div id="score">分数：0</div>

    <!-- ✅ 棋盘 -->
    <div id="board"></div>

    <!-- ✅ 备选方块 -->
    <div id="pieces"></div>
  </div>

  <!-- ✅ Game Over 画面（由 JS 控制显示） -->
  <div id="result" class="hidden">
    <h2 id="result-title"></h2>
    <img id="result-image" />
    <p id="result-text"></p>
  </div>

</div>

<!-- ✅ JS 放最后，确保 DOM 已存在 -->
<script src="game.js"></script>

</body>
</html>
