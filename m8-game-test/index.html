<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ 手机 viewport：避免被当成桌机缩小 -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>花园 Block 游戏（最终版）</title>

  <!-- ✅ 游戏专用样式 -->
  <link rel="stylesheet" href="style.css" />

  <!-- ✅ ✅ ✅ 手机首次载入自动适应（关键，不需要用户刷新） -->
  <script>
    function fixViewport() {
      const h = window.innerHeight;
      document.documentElement.style.height = h + 'px';
      document.body.style.height = h + 'px';
    }

    // 第一次完整载入
    window.addEventListener('load', fixViewport);

    // 地址栏展开 / 收起（Safari / WeChat 必须）
    window.addEventListener('resize', () => {
      setTimeout(fixViewport, 50);
    });

    // 保险：初次渲染后再触发一次
    setTimeout(() => {
      window.dispatchEvent(new Event('resize'));
    }, 300);
  </script>
</head>

<body>

<div id="app">

  <!-- ✅ 游戏主体 -->
  <div id="game">

    <!-- ✅ 分数显示（game.js 会操作这个） -->
    <div id="score">分数：0</div>

    <!-- ✅ 棋盘 -->
    <div id="board"></div>

    <!-- ✅ 备选方块 -->
    <div id="pieces"></div>
  </div>

  <!-- ✅ Game Over 画面（由 JS 控制显示） -->
  <div id="result" class="hidden">
    <h2 id="result-title"></h2>
    <img id="result-image" alt="" />
    <p id="result-text"></p>
  </div>

</div>

<!-- ✅ JS 放最后，确保 DOM 已经存在 -->
<script src="game.js"></script>
<div id="drag-ghost" class="ghost hidden"></div>


</body>
</html>
