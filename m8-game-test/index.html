<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>花园 Block 游戏（最终版）</title>

  <!-- ✅ 正确载入游戏专用 CSS（相对路径） -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- ✅ 游戏画面（game.js 就是操作这里） -->
  <div id="game">
    <!-- ✅ 关键：分数一定要用 id="score" -->
    <div id="score">分数：0</div>

    <div id="board"></div>
    <div id="pieces"></div>
  </div>

  <!-- ✅ 结算画面（Game Over 时才显示） -->
  <div id="result" class="hidden">
    <h2 id="result-title"></h2>
    <img id="result-image">
    <p id="result-text"></p>
  </div>

</div>

<!-- ✅ 正确载入 JS（放在最后，确保 DOM 已存在） -->
<script src="game.js"></script>

</body>
</html>
