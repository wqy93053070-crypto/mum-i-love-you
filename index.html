<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >
  <title>妮妮，你愿意嫁给我吗？</title>

  <!-- ✅ 正確載入主頁樣式 -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ❤️ 爱心背景 -->
<div class="hearts">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div id="app">

  <!-- 🌸 主舞台 -->
  <div id="main-stage">
    <div class="card">

      <p class="line">妮妮，</p>
      <p class="line">你愿意嫁给我吗？</p>

      <img
        src="assets/images/intro-love.png"
        class="main-img"
        alt="告白图片"
      >

      <!-- ▶️ 开始按钮（一定可见） -->
      <button id="start-btn" class="start-btn">
        开始游戏
      </button>
    </div>
  </div>

  <!-- 🐒🐷🐲 左下角陪伴 -->
  <div id="companion">
    <div id="speech"></div>
    <img src="assets/images/monkey.png" alt="">
    <img src="assets/images/pig.png" alt="">
    <img src="assets/images/dragon.png" alt="">
  </div>

</div>

<!-- 🔊 音效 -->
<audio
  id="pig-audio"
  src="assets/audio/pig-voice.mp3"
  preload="auto">
</audio>

<!-- ✅ 主頁邏輯 -->
<script src="game.js"></script>

</body>
</html>
