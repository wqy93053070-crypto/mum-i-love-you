<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <!-- ✅ 手机关键：viewport（避免缩小） -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>妮妮，你愿意嫁给我吗？</title>

  <!-- ✅ 正确载入 CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- ✅ ✅ ✅ 手机自动适应修正（无需刷新） -->
  <script>
    function fixViewport() {
      const h = window.innerHeight;
      document.documentElement.style.height = h + 'px';
      document.body.style.height = h + 'px';
    }

    // 初次载入修正
    window.addEventListener('load', fixViewport);

    // WeChat / Safari 地址栏变化再修正
    window.addEventListener('resize', () => {
      setTimeout(fixViewport, 50);
    });

    // 保险：首次渲染后再触发一次
    setTimeout(() => {
      window.dispatchEvent(new Event('resize'));
    }, 300);
  </script>
</head>

<body>

<!-- ❤️ 爱心背景 -->
<div class="hearts">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div id="app">

  <!-- 🌸 主舞台 -->
  <div id="main-stage">
    <div class="card">

      <!-- 文案 -->
      <p class="line">妮妮，</p>
      <p class="line">你愿意嫁给我吗？</p>

      <!-- 告白图片 -->
      <img
        src="assets/images/intro-love.png"
        class="main-img"
        alt="告白图片"
      />

      <!-- 🐒🐷🐲 跑动角色 -->
      <div class="runner-layer">
        <img src="assets/images/monkey.png" class="runner" alt="" />
        <img src="assets/images/pig.png" class="runner" alt="" />
        <img src="assets/images/dragon.png" class="runner" alt="" />
      </div>

      <!-- 🌸 游戏结束后的花语展示（初始隐藏） -->
      <div id="flower-message" class="flower-message hidden">
        <div class="flower-title">🌷 今日的花语</div>
        <div id="flower-text" class="flower-text"></div>
      </div>

      <!-- ▶️ 开始按钮 -->
      <button
 -you/m8-game-test/'  class="start-btn"


    </div>
  </div>

  <!-- 🐒🐷🐲 左下角陪伴 -->
  <div id="companion">
    <div id="speech"></div>
    <img src="assets/images/monkey.png" alt="" />
    <img src="assets/images/pig.png" alt="" />
    <img src="assets/images/dragon.png" alt="" />
  </div>

</div>

<!-- 🎮 游戏 iframe（手机 & GitHub Pages 最稳） -->
<div id="game-container" class="hidden">
  <iframe
    src="/mum-i-love-you/m8-game-test/"
    frameborder="0"
    allowfullscreen
    style="width:100%; height:100vh; border:none;"
  ></iframe>
</div>

<!-- 🔊 音效 -->
<audio
  id="pig-audio"
  src="assets/audio/pig-voice.mp3"
  preload="auto">
</audio>

<!-- ✅ 主页面逻辑 -->
<script src="game.js"></script>

</body>
</html>
